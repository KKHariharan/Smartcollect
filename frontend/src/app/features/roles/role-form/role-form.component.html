<div class="sc-page-header">
  <h1>{{ roleId() ? 'Edit Role' : 'Add Role' }}</h1>
  <a mat-stroked-button routerLink="/roles">Back to list</a>
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" class="sc-form" style="max-width: 640px">
      <div class="sc-form__row">
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Role name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Description</mat-label>
          <input matInput formControlName="description" />
        </mat-form-field>
      </div>

      <h3>Permissions</h3>
      <div class="sc-permission-groups">
        @for (group of permissionGroups; track group.label) {
          <div class="sc-permission-group">
            <h4>{{ group.label }}</h4>
            @for (perm of group.permissions; track perm.value) {
              <mat-checkbox
                [checked]="isChecked(perm.value)"
                (change)="toggle(perm.value, $event.checked)"
              >
                {{ perm.label }}
              </mat-checkbox>
            }
          </div>
        }
      </div>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="saving()"
        class="sc-form__submit"
      >
        {{ roleId() ? 'Save changes' : 'Create role' }}
      </button>
    </form>
  </mat-card-content>
</mat-card>
