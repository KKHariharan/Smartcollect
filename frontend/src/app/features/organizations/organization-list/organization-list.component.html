<div class="sc-page-header">
  <h1>Organizations</h1>
  @if (isSuperAdmin()) {
    <a mat-flat-button color="primary" routerLink="/organizations/new">
      <mat-icon>add</mat-icon> Add Organization
    </a>
  }
</div>

@if (loading()) {
  <div class="sc-loading"><mat-spinner diameter="32"></mat-spinner></div>
} @else {
  <table mat-table [dataSource]="organizations()" class="sc-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let row">{{ row.code }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">
        <mat-chip>{{ row.status }}</mat-chip>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        @if (isSuperAdmin()) {
          <a mat-icon-button [routerLink]="['/organizations', row._id, 'edit']" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </a>
          <button mat-icon-button (click)="remove(row)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        }
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>

  @if (organizations().length === 0) {
    <p class="sc-empty">No organizations found.</p>
  }

  <mat-paginator
    [length]="total()"
    [pageSize]="pageSize()"
    [pageIndex]="pageIndex()"
    [pageSizeOptions]="[10, 20, 50]"
    (page)="onPage($event)"
  ></mat-paginator>
}
