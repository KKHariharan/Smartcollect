<div class="sc-page-header">
  <h1>New Support Ticket</h1>
  <a mat-stroked-button routerLink="/support">Back to list</a>
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" class="sc-form" style="max-width: 560px">
      @if (!isCustomerPortal) {
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Customer</mat-label>
          <mat-select formControlName="customer">
            @for (customer of customers(); track customer._id) {
              <mat-option [value]="customer._id"
                >{{ customer.name }} ({{ customer.customerCode }})</mat-option
              >
            }
          </mat-select>
        </mat-form-field>
      }

      <mat-form-field appearance="outline" class="sc-form__field">
        <mat-label>Subject</mat-label>
        <input matInput formControlName="subject" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="sc-form__field">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="4"></textarea>
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="saving()"
        class="sc-form__submit"
      >
        Create ticket
      </button>
    </form>
  </mat-card-content>
</mat-card>
