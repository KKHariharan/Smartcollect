<div class="sc-page-header">
  <h1>{{ expenseId() ? 'Edit Expense' : 'Add Expense' }}</h1>
  <a mat-stroked-button routerLink="/expenses">Back to list</a>
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" class="sc-form" style="max-width: 480px">
      <mat-form-field appearance="outline" class="sc-form__field">
        <mat-label>Category</mat-label>
        <mat-select formControlName="category">
          <mat-option value="salary">Salary</mat-option>
          <mat-option value="rent">Rent</mat-option>
          <mat-option value="fuel">Fuel</mat-option>
          <mat-option value="internet">Internet</mat-option>
          <mat-option value="utilities">Utilities</mat-option>
          <mat-option value="miscellaneous">Miscellaneous</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="sc-form__field">
        <mat-label>Amount</mat-label>
        <input matInput type="number" formControlName="amount" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="sc-form__field">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="2"></textarea>
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="saving()"
        class="sc-form__submit"
      >
        {{ expenseId() ? 'Save changes' : 'Create expense' }}
      </button>
    </form>
  </mat-card-content>
</mat-card>
