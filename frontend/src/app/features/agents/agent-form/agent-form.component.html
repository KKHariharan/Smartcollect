<div class="sc-page-header">
  <h1>{{ agentId() ? 'Edit Agent' : 'Add Agent' }}</h1>
  <a mat-stroked-button routerLink="/agents">Back to list</a>
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" class="sc-form" style="max-width: 560px">
      <div class="sc-form__row">
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Full name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Mobile</mat-label>
          <input matInput formControlName="mobile" />
          @if (form.controls.mobile.hasError('pattern')) {
            <mat-error>Mobile number must be exactly 10 digits</mat-error>
          }
        </mat-form-field>
      </div>

      <div class="sc-form__row">
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Area</mat-label>
          <input matInput formControlName="area" />
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="sc-form__field">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <mat-option value="active">Active</mat-option>
          <mat-option value="inactive">Inactive</mat-option>
        </mat-select>
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="saving()"
        class="sc-form__submit"
      >
        {{ agentId() ? 'Save changes' : 'Create agent' }}
      </button>
    </form>
  </mat-card-content>
</mat-card>
