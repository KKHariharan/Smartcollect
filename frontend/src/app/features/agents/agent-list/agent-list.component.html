<div class="sc-page-header">
  <h1>Agents</h1>
  @if (canCreate) {
    <a mat-flat-button color="primary" routerLink="/agents/new">
      <mat-icon>add</mat-icon>
      Add Agent
    </a>
  }
</div>

<mat-form-field appearance="outline" class="sc-search-field">
  <mat-label>Search by name, mobile, or code</mat-label>
  <input matInput #searchInput (keyup.enter)="onSearch(searchInput.value)" />
  <button matSuffix mat-icon-button (click)="onSearch(searchInput.value)">
    <mat-icon>search</mat-icon>
  </button>
</mat-form-field>

@if (loading()) {
  <div class="sc-loading"><mat-spinner diameter="32"></mat-spinner></div>
} @else {
  <table mat-table [dataSource]="agents()" class="sc-table">
    <ng-container matColumnDef="agentCode">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let row">{{ row.agentCode }}</td>
    </ng-container>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>
    <ng-container matColumnDef="mobile">
      <th mat-header-cell *matHeaderCellDef>Mobile</th>
      <td mat-cell *matCellDef="let row">{{ row.mobile }}</td>
    </ng-container>
    <ng-container matColumnDef="area">
      <th mat-header-cell *matHeaderCellDef>Area</th>
      <td mat-cell *matCellDef="let row">{{ row.area || '—' }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">
        <mat-chip [color]="row.status === 'active' ? 'primary' : undefined">{{
          row.status
        }}</mat-chip>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        <a mat-icon-button [routerLink]="['/agents', row._id]" matTooltip="View details">
          <mat-icon>visibility</mat-icon>
        </a>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>

  @if (agents().length === 0) {
    <p class="sc-empty">No agents found.</p>
  }

  <mat-paginator
    [length]="total()"
    [pageSize]="pageSize()"
    [pageIndex]="pageIndex()"
    [pageSizeOptions]="[10, 20, 50]"
    (page)="onPage($event)"
  ></mat-paginator>
}
