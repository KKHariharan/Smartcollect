<div class="sc-page-header">
  <h1>New Loan</h1>
  <a mat-stroked-button routerLink="/loans">Back to list</a>
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" class="sc-form" style="max-width: 560px">
      <mat-form-field appearance="outline" class="sc-form__field">
        <mat-label>Customer</mat-label>
        <mat-select formControlName="customer">
          @for (customer of customers(); track customer._id) {
            <mat-option [value]="customer._id"
              >{{ customer.name }} ({{ customer.customerCode }})</mat-option
            >
          }
        </mat-select>
      </mat-form-field>

      <div class="sc-form__row">
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Principal amount</mat-label>
          <input matInput type="number" formControlName="principalAmount" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Interest rate (%)</mat-label>
          <input matInput type="number" formControlName="interestRate" />
        </mat-form-field>
      </div>

      <div class="sc-form__row">
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Number of installments</mat-label>
          <input matInput type="number" formControlName="totalInstallments" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>EMI type</mat-label>
          <mat-select formControlName="emiType">
            <mat-option value="daily">Daily</mat-option>
            <mat-option value="weekly">Weekly</mat-option>
            <mat-option value="monthly">Monthly</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="sc-form__row">
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Processing fee</mat-label>
          <input matInput type="number" formControlName="processingFee" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="sc-form__field">
          <mat-label>Penalty / day</mat-label>
          <input matInput type="number" formControlName="penaltyChargePerDay" />
        </mat-form-field>
      </div>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="saving()"
        class="sc-form__submit"
      >
        Create loan
      </button>
    </form>
  </mat-card-content>
</mat-card>
