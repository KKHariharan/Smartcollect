<div class="sc-page-header">
  <h1>My Profile</h1>
  <a mat-stroked-button routerLink="/profile/change-password">Change Password</a>
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="save()" class="sc-form" style="max-width: 480px">
      <mat-form-field appearance="outline" class="sc-form__field">
        <mat-label>Email</mat-label>
        <input matInput [value]="currentUser()?.email" disabled />
      </mat-form-field>

      <mat-form-field appearance="outline" class="sc-form__field">
        <mat-label>Full name</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="sc-form__field">
        <mat-label>Mobile</mat-label>
        <input matInput formControlName="mobile" />
        @if (form.controls.mobile.hasError('pattern')) {
          <mat-error>Mobile number must be exactly 10 digits</mat-error>
        }
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="saving()"
        class="sc-form__submit"
      >
        Save changes
      </button>
    </form>
  </mat-card-content>
</mat-card>
